    <script>
     AFRAME.registerComponent('toggle-panel', {
        schema: {
         target: { type: 'selector' },
          group: { type: 'string', default: '.info-panel' }
       },

        init: function () {
         this.el.addEventListener('click', () => {
            const targetPanel = this.data.target;
           const allPanels = document.querySelectorAll(this.data.group);
           const wasVisible = targetPanel.getAttribute('visible');

        // Cierra todos los carteles
        allPanels.forEach(panel => {
          panel.setAttribute('visible', false);
           });

        // Abre o cierra el cartel pulsado
         targetPanel.setAttribute('visible', !wasVisible);
           });
         }
       });
    </script>

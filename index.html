<!DOCTYPE html>
<html lang="en">

 
  <!-- A VR PPB Reactor reconstruction by Sofia Lopez - Jose L. Rubio - D. Puyol - URJC-->
 
  <head>
    ...
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-babia-components/dist/aframe-babia-components.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.0.0/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.0/dist/aframe-extras.min.js"></script>
  </head>

  <body>
    
    <a-scene 
      fog="type: exponential; color: #ffffff; density: 0"
      renderer="colorManagement: true; physicallyCorrectLights: true">
      
    
      
      <!-- Environment -->

      <a-sky src="ASSETS/HDRI_qwantani_dusk_2_puresky.jpg" rotation="0 0 0"></a-sky>

      
      <!-- Light  -->
        
      <a-entity light="type: ambient; intensity: 2.5" color="#ffffff"></a-entity>
      <a-entity light="type: directional; intensity: 0.8; castShadow: false" position="0 2.5 0"></a-entity>
      

     
      <!-- Camera -->
      <a-entity movement-controls="fly: false" position="0 0 0">
        <a-entity id="camera" camera position="0 1.6 0" look-controls></a-entity>
        <a-entity cursor="rayOrigin:mouse"></a-entity>
        <a-entity laser-controls="hand: right"></a-entity>
      </a-entity>

      <!-- Reference sphere-->
       <a-sphere position="0 0 0" radius="0.2" color="#EF2D5E" visible="false"></a-sphere>
      
      
        
      
       
       
      <!-- ********************************* -->
      <!--        Carteles       -->        
      <!-- ********************************* -->
       
  
       
  <!-- Script for click and scale each item -->
  <script>
    AFRAME.registerComponent('scale-on-click', {
      schema: {
        scale: {type: 'vec3', default: {x: 6, y: 6, z: 6}}  // Valor de escala por defecto
      },
      init: function () {
        var el = this.el;  // El elemento en el que se aplica el componente
        el.addEventListener('click', function () {
          // Cambiar la escala del elemento al hacer clic
          el.setAttribute('scale', el.getAttribute('scale').x === 0.4 ? {x: 1, y: 1, z: 1} : {x: 0.4, y: 0.4, z: 0.4});
        });
      }
    });

    // Asignar el componente a cada elemento por separado
    document.querySelector('#aaa').setAttribute('scale-on-click', '');
    document.querySelector('#bbb').setAttribute('scale-on-click', '');
    document.querySelector('#ccc').setAttribute('scale-on-click', '');
    document.querySelector('#ddd').setAttribute('scale-on-click', '');

  </script>
      
           
      
     

      <!-- ********************************* -->
      <!--        Assets Enviro       -->        
      <!-- ********************************* -->
      

      
      <!-- Blockout -->
            
    
      <a-assets>
        <a-asset-item id="reactorblockout" src="ASSETS/Blockout_MEI.glb"></a-asset-item>
      </a-assets>
   

      <a-entity gltf-model="#reactorblockout" scale="1 1 1" position="0 0.1 0" animation-mixer="clip: *; loop: repeat; repetitions: Infinity; timeScale: 1"></a-entity>
       

               <!-- Valla -->
            
      <a-assets>
        <a-asset-item id="valla" src="assets/Valla_REACT.glb"></a-asset-item>
      </a-assets>
   
      <a-entity gltf-model="#valla" scale="1 1 1" position="0 0 0" material="repeat: 20 20"></a-entity>
      
      
      <!-- Ground -->
         
      <a-assets>
        <a-asset-item id="ground" src="ASSETS/concrete_floor_worn_001_diff_4k.png"></a-asset-item>
      </a-assets>
      
      <a-image src="#ground" height="60" width="60" rotation="-90 90 0" repeat="50 50" roughness= "0.8" shader= "flat"></a-image>
      
 

    </a-scene>
  </body>

</html>
